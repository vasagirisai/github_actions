name: ansible-lint

on:
  push:
    branches: vasagirisai-patch-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
          ref: develop
    - name: Set up Python 3.7
      uses: actions/setup-python@v2
      with:
        python-version: 3.7
    - name: Install dependencies
      run: |
        sudo python -m pip install ansible-lint
    - name: Run ansible-lint
      run: |
        ansible-lint *.yml
    - name: Reset working branch
      run: |
          git fetch origin vasagirisai-patch-1:vasagirisai-patch-1
          git reset --hard vasagirisai-patch-1
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v4
      with:
        branch: vasagirisai-patch-1
        title: Created by github actions
        labels: enchacement
        milestone: 1
        reviewers: vasagirisai
        commit-message: checking the syntax check using anisble lint
